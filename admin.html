<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة تحكم المنتجات | تاتش ميد</title>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue-900:#0a2a5e;--blue-700:#14428f;--blue-600:#1a4fa8;--blue-500:#1f5cc2;--blue-100:#dce9fb;--blue-50:#eef4fd;
  --accent:#25d366;--danger:#e6494f;--radius:16px;
}
[data-theme="light"]{--bg:#f5f8fd;--card:#fff;--ink:#0d1b33;--ink-2:#5b6a89;--line:rgba(20,66,143,.14);--chip:var(--blue-50);--shadow:0 14px 40px -18px rgba(15,53,116,.25)}
[data-theme="dark"]{--bg:#080f1e;--card:#101d3c;--ink:#e9f0fb;--ink-2:#aebcd6;--line:rgba(123,166,234,.16);--chip:rgba(31,92,194,.16);--shadow:0 18px 46px -18px rgba(0,0,0,.6)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;transition:background .3s,color .3s}
h1,h2,h3,.disp{font-family:'Alexandria',sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:2rem 1.2rem 5rem}
header{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;padding:1.4rem 0;border-bottom:1px solid var(--line);margin-bottom:2rem}
.brand{display:flex;align-items:center;gap:.7rem;font-weight:800;font-size:1.2rem}
.brand .mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(160deg,var(--blue-700),var(--blue-500));display:grid;place-items:center;color:#fff;font-size:1.3rem}
.icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--card);cursor:pointer;font-size:1.1rem}
.gate{max-width:420px;margin:4rem auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:2.2rem;box-shadow:var(--shadow);text-align:center}
.gate h2{margin-bottom:.5rem}
.gate p{color:var(--ink-2);font-size:.92rem;margin-bottom:1.4rem}
.gate input{width:100%;padding:.85rem 1rem;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:1rem;margin-bottom:1rem;text-align:center}
.gate button{width:100%;padding:.85rem;border:none;border-radius:10px;background:var(--blue-600);color:#fff;font-weight:700;cursor:pointer;font-size:1rem}
.gate small{display:block;margin-top:1rem;color:var(--ink-2);font-size:.78rem}
.hidden{display:none !important}
.grid2{display:grid;gap:1.6rem}
@media(min-width:900px){.grid2{grid-template-columns:1fr 1.35fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:1.6rem;box-shadow:var(--shadow)}
.panel h3{margin-bottom:1.1rem;font-size:1.05rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.85rem;font-weight:700;margin-bottom:.4rem;color:var(--ink-2)}
.field input,.field select,.field textarea{
  width:100%;padding:.7rem .9rem;border-radius:10px;border:1px solid var(--line);
  background:var(--bg);color:var(--ink);font-family:inherit;font-size:.95rem;
}
.field textarea{resize:vertical;min-height:80px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.check{display:flex;align-items:center;gap:.5rem;font-size:.9rem;font-weight:600}
.btn{padding:.75rem 1.4rem;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:.92rem;transition:transform .2s,opacity .2s}
.btn:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-primary{background:var(--blue-600);color:#fff;width:100%}
.btn-ghost{background:var(--chip);color:var(--blue-600)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.actions-row{display:flex;gap:.7rem;margin-top:.4rem}
.list{display:flex;flex-direction:column;gap:.8rem;max-height:640px;overflow:auto;padding-left:.3rem}
.p-row{display:flex;gap:.9rem;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:.8rem .9rem}
.p-row .thumb{width:52px;height:52px;border-radius:9px;background:linear-gradient(160deg,var(--blue-700),var(--blue-500));display:grid;place-items:center;color:#fff;font-size:1.3rem;flex:0 0 52px;overflow:hidden}
.p-row .thumb img{width:100%;height:100%;object-fit:cover}
.p-row .info{flex:1;min-width:0}
.p-row .info b{display:block;font-size:.92rem}
.p-row .info span{font-size:.78rem;color:var(--ink-2)}
.p-row .acts{display:flex;gap:.4rem}
.p-row .acts button{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--card);cursor:pointer}
.toolbar{display:flex;flex-wrap:wrap;gap:.7rem;margin-bottom:1.2rem;align-items:center}
.badge-count{background:var(--chip);color:var(--blue-600);padding:.35rem .9rem;border-radius:999px;font-size:.8rem;font-weight:700}
.status-dot{display:inline-flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--ink-2)}
.status-dot i{width:8px;height:8px;border-radius:50%;background:#9db3d6}
.status-dot.ok i{background:var(--accent)}
.status-dot.bad i{background:var(--danger)}
.empty-hint{text-align:center;color:var(--ink-2);font-size:.85rem;padding:2rem 1rem}
/* image upload */
.img-upload{display:flex;flex-direction:column;gap:.7rem}
.img-pick-btn{width:100%;text-align:center}
.img-preview{position:relative;width:120px;height:120px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.img-preview img{width:100%;height:100%;object-fit:cover;display:block}
.img-remove{
  position:absolute;top:6px;left:6px;width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(0,0,0,.55);color:#fff;font-size:.8rem;display:grid;place-items:center;
}
.img-status{font-size:.8rem;color:var(--ink-2);display:flex;align-items:center;gap:.5rem}
.img-status .spinner{border-color:rgba(26,79,168,.3);border-top-color:var(--blue-600)}
.img-url-alt{margin-top:.6rem}
.img-url-alt summary{font-size:.78rem;color:var(--ink-2);cursor:pointer;user-select:none}
.img-url-alt input{width:100%;padding:.7rem .9rem;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:.9rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(120%);background:var(--blue-700);color:#fff;padding:.9rem 1.6rem;border-radius:999px;font-size:.9rem;font-weight:600;box-shadow:var(--shadow);transition:transform .4s cubic-bezier(.22,1,.36,1);z-index:99;max-width:88vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(8,15,30,.55);display:flex;align-items:center;justify-content:center;z-index:120;backdrop-filter:blur(3px)}
.modal{background:var(--card);border-radius:var(--radius);padding:2rem;max-width:420px;width:92%;box-shadow:var(--shadow)}
.modal h3{margin-bottom:.6rem}
.modal p{color:var(--ink-2);font-size:.85rem;margin-bottom:1.2rem;line-height:1.9}
.spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ============ ACCESS GATE ============ -->
<div class="gate" id="gate">
  <h2>🔒 لوحة تحكم المنتجات</h2>
  <p>الصفحة دي مخصصة لإدارة منتجات تاتش ميد فقط.</p>
  <input type="password" id="pwInput" placeholder="أدخل كلمة المرور">
  <button class="btn btn-primary" onclick="tryLogin()">دخول</button>
  <small>حماية بسيطة لمنع الزوار العاديين فقط.</small>
</div>

<div class="wrap hidden" id="app">
  <header>
    <div class="brand"><span class="mark">🩺</span> لوحة تحكم منتجات تاتش ميد</div>
    <div style="display:flex;gap:.6rem;align-items:center">
      <span class="status-dot" id="statusDot"><i></i> <span id="statusText">جاري التحقق...</span></span>
      <span class="badge-count" id="countBadge">0 منتج</span>
      <button class="icon-btn" id="themeBtn" title="الوضع الليلي">🌙</button>
    </div>
  </header>

  <div class="toolbar">
    <button class="btn btn-ghost" onclick="refreshFromGitHub()">🔄 تحديث القائمة</button>
    <a class="btn btn-ghost" href="index.html" target="_blank">🌐 معاينة الموقع</a>
  </div>

  <div class="grid2">
    <!-- FORM -->
    <div class="panel">
      <h3 id="formTitle">➕ إضافة منتج جديد</h3>
      <input type="hidden" id="editId">
      <div class="field">
        <label>اسم المنتج</label>
        <input type="text" id="fName" placeholder="مثال: جهاز قياس ضغط رقمي">
      </div>
      <div class="row2">
        <div class="field">
          <label>القسم</label>
          <select id="fCat">
            <option>مستلزمات طبية</option>
            <option>أجهزة طبية</option>
            <option>نماذج تعليمية</option>
            <option>رعاية منزلية</option>
          </select>
        </div>
        <div class="field">
          <label>السعر (ج.م)</label>
          <input type="number" id="fPrice" placeholder="مثال: 450">
        </div>
      </div>
      <div class="field">
        <label>صورة المنتج (اختياري)</label>
        <div class="img-upload" id="imgUpload">
          <input type="file" id="fImageFile" accept="image/*" class="hidden">
          <div class="img-preview hidden" id="imgPreview">
            <img id="imgPreviewEl" alt="معاينة">
            <button type="button" class="img-remove" onclick="clearImage()" title="إزالة الصورة">✕</button>
          </div>
          <button type="button" class="btn btn-ghost img-pick-btn" id="imgPickBtn" onclick="document.getElementById('fImageFile').click()">📷 اختر صورة من الجهاز</button>
          <div class="img-status hidden" id="imgStatus"></div>
        </div>
        <details class="img-url-alt">
          <summary>أو الصق رابط صورة جاهز</summary>
          <input type="text" id="fImage" placeholder="https://..." style="margin-top:.5rem">
        </details>
      </div>
      <div class="field">
        <label>الوصف</label>
        <textarea id="fDesc" placeholder="وصف مختصر للمنتج..."></textarea>
      </div>
      <div class="field check">
        <input type="checkbox" id="fFeatured">
        <label for="fFeatured" style="margin:0">منتج مميز (يظهر عليه شارة "مميز")</label>
      </div>
      <div class="actions-row">
        <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">💾 حفظ المنتج على الموقع</button>
        <button class="btn btn-ghost hidden" id="cancelEdit" onclick="resetForm()">إلغاء</button>
      </div>
    </div>

    <!-- LIST -->
    <div class="panel">
      <h3>📦 المنتجات الحالية</h3>
      <div class="list" id="prodList"><div class="empty-hint">جاري التحميل...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   إعدادات ثابتة للريبو — الأدمين مش محتاج يعرف عنها حاجة
   ============================================================ */
const REPO_OWNER = "TouchMedCom";
const REPO_NAME  = "touch-med-website";
const REPO_BRANCH= "main";
const FILE_PATH  = "products.json";
const ADMIN_PASSWORD = "touchmed2026"; // غيّرها براحتك

/* ============ ACCESS GATE ============ */
function tryLogin(){
  const val = document.getElementById('pwInput').value;
  if(val === ADMIN_PASSWORD){
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    try{ sessionStorage.setItem('tm-admin-ok','1'); }catch(e){}
    boot();
  } else {
    showToast('❌ كلمة المرور غلط');
  }
}
try{
  if(sessionStorage.getItem('tm-admin-ok')==='1'){
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
  }
}catch(e){}
document.getElementById('pwInput').addEventListener('keydown',e=>{ if(e.key==='Enter') tryLogin(); });

/* ============ THEME ============ */
const root=document.documentElement, tBtn=document.getElementById('themeBtn');
function setTheme(t){ root.setAttribute('data-theme',t); tBtn.textContent=t==='dark'?'☀️':'🌙'; try{localStorage.setItem('tm-theme',t)}catch(e){} }
try{ const s=localStorage.getItem('tm-theme'); if(s) setTheme(s); }catch(e){}
tBtn.addEventListener('click',()=>setTheme(root.getAttribute('data-theme')==='dark'?'light':'dark'));

/* ============ GITHUB TOKEN (stored ONLY in this browser, never shipped in the file) ============ */
function getToken(){
  try{ return localStorage.getItem('tm-gh-token') || ''; }catch(e){ return ''; }
}
function setToken(t){
  try{ localStorage.setItem('tm-gh-token', t); }catch(e){}
}
function askForToken(promptMsg){
  return new Promise(resolve=>{
    const overlay=document.createElement('div');
    overlay.className='overlay';
    overlay.innerHTML=`
      <div class="modal">
        <h3>🔑 مطلوب مفتاح ربط GitHub</h3>
        <p>${promptMsg||'عشان لوحة التحكم تقدر تحدّث الموقع مباشرة، محتاجة مفتاح GitHub الخاص بيك مرة واحدة. المفتاح ده بيتحفظ في متصفحك فقط ومش بيتنشر مع الموقع.'}</p>
        <input type="password" id="tokenInput" placeholder="الصق المفتاح هنا" style="width:100%;padding:.8rem 1rem;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--ink);margin-bottom:1rem;font-size:.9rem">
        <button class="btn btn-primary" id="tokenSaveBtn">حفظ ومتابعة</button>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('tokenSaveBtn').onclick=()=>{
      const v=document.getElementById('tokenInput').value.trim();
      document.body.removeChild(overlay);
      if(v){ setToken(v); }
      resolve(v);
    };
  });
}

/* ============ GITHUB API HELPERS ============ */
const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;

function b64EncodeUnicode(str){
  return btoa(unescape(encodeURIComponent(str)));
}
function b64DecodeUnicode(str){
  return decodeURIComponent(escape(atob(str)));
}

async function ghGetFile(token){
  const res = await fetch(API_BASE + `?ref=${REPO_BRANCH}&_=${Date.now()}`, {
    headers:{ 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json' }
  });
  if(res.status===401 || res.status===403) throw {kind:'auth'};
  if(!res.ok) throw {kind:'other', status:res.status};
  const data = await res.json();
  const content = b64DecodeUnicode(data.content.replace(/\n/g,''));
  return { sha: data.sha, products: JSON.parse(content) };
}

async function ghPutFile(token, sha, productsArr, message){
  const body = {
    message: message || 'تحديث المنتجات من لوحة التحكم',
    content: b64EncodeUnicode(JSON.stringify(productsArr, null, 2)),
    branch: REPO_BRANCH
  };
  if(sha) body.sha = sha;
  const res = await fetch(API_BASE, {
    method:'PUT',
    headers:{ 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if(res.status===401 || res.status===403) throw {kind:'auth'};
  if(!res.ok){ const t=await res.text(); throw {kind:'other', status:res.status, detail:t}; }
  return res.json();
}

/* ============ IMAGE: compress client-side then upload to images/ folder in the repo ============ */
let pendingImageB64 = null;   // compressed image waiting to be uploaded on save
let pendingImageExisting = ''; // existing image URL when editing

function compressImage(file, maxDim=900, quality=.8){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let {width:w,height:h}=img;
      if(w>maxDim || h>maxDim){
        const s=maxDim/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s);
      }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',quality);
      resolve(dataUrl.split(',')[1]); // pure base64
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('bad image')); };
    img.src=url;
  });
}

async function ghUploadImage(token, b64content, filename){
  const url=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/images/${filename}`;
  const res=await fetch(url,{
    method:'PUT',
    headers:{ 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify({ message:'رفع صورة منتج: '+filename, content:b64content, branch:REPO_BRANCH })
  });
  if(res.status===401 || res.status===403) throw {kind:'auth'};
  if(!res.ok){ const t=await res.text(); throw {kind:'other', status:res.status, detail:t}; }
  return 'images/'+filename; // relative path works on the Pages site
}

document.getElementById('fImageFile').addEventListener('change', async function(){
  const file=this.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ showToast('❌ الملف ده مش صورة'); this.value=''; return; }
  const status=document.getElementById('imgStatus');
  status.classList.remove('hidden');
  status.innerHTML='<span class="spinner"></span> جاري تجهيز الصورة...';
  try{
    pendingImageB64 = await compressImage(file);
    pendingImageExisting = '';
    document.getElementById('imgPreviewEl').src = 'data:image/jpeg;base64,' + pendingImageB64;
    document.getElementById('imgPreview').classList.remove('hidden');
    document.getElementById('imgPickBtn').textContent = '📷 تغيير الصورة';
    status.textContent = '✅ الصورة جاهزة — هتترفع لما تدوس حفظ';
  }catch(e){
    status.classList.add('hidden');
    showToast('❌ حصلت مشكلة في قراءة الصورة، جرّب صورة تانية');
  }
  this.value='';
});

function clearImage(){
  pendingImageB64 = null;
  pendingImageExisting = '';
  document.getElementById('imgPreview').classList.add('hidden');
  document.getElementById('imgPreviewEl').src = '';
  document.getElementById('imgPickBtn').textContent = '📷 اختر صورة من الجهاز';
  document.getElementById('imgStatus').classList.add('hidden');
  document.getElementById('fImage').value = '';
}

/* ============ STATE ============ */
let products = [];
let currentSha = null;

function setStatus(state, text){
  const dot=document.getElementById('statusDot');
  dot.className='status-dot ' + (state==='ok'?'ok':state==='bad'?'bad':'');
  document.getElementById('statusText').textContent = text;
}

async function ensureTokenAndLoad(){
  let token = getToken();
  if(!token){
    token = await askForToken();
    if(!token){ setStatus('bad','محتاج مفتاح GitHub للمتابعة'); return; }
  }
  setStatus('', 'جاري الاتصال...');
  try{
    const {sha, products:list} = await ghGetFile(token);
    currentSha = sha; products = list;
    setStatus('ok','متصل بالموقع مباشرة ✅');
    renderList();
  }catch(err){
    if(err.kind==='auth'){
      showToast('❌ المفتاح غير صحيح أو منتهي الصلاحية');
      setToken('');
      setStatus('bad','المفتاح غير صالح — حاول تاني');
      const retry = await askForToken('المفتاح اللي دخلته مش شغال. الصق مفتاح صحيح من GitHub.');
      if(retry) return ensureTokenAndLoad();
    } else {
      setStatus('bad','تعذر الاتصال بالموقع');
      showToast('⚠️ حصل خطأ أثناء الاتصال، جرّب تاني');
    }
  }
}

function refreshFromGitHub(){ ensureTokenAndLoad(); }

function renderList(){
  const list=document.getElementById('prodList');
  document.getElementById('countBadge').textContent = products.length + ' منتج';
  if(!products.length){
    list.innerHTML='<div class="empty-hint">مفيش منتجات لسه — ضيف أول منتج من الفورم 👈</div>';
    return;
  }
  list.innerHTML = products.map(p=>`
    <div class="p-row">
      <div class="thumb">${p.image?`<img src="${p.image}" alt="">`:'🩺'}</div>
      <div class="info">
        <b>${p.name}${p.featured?' ⭐':''}</b>
        <span>${p.category||''} ${p.price?'· '+p.price+' ج.م':''}</span>
      </div>
      <div class="acts">
        <button title="تعديل" onclick="editProduct('${p.id}')">✏️</button>
        <button title="حذف" onclick="deleteProduct('${p.id}')">🗑️</button>
      </div>
    </div>`).join('');
}

function resetForm(){
  document.getElementById('editId').value='';
  document.getElementById('fName').value='';
  document.getElementById('fCat').value='مستلزمات طبية';
  document.getElementById('fPrice').value='';
  document.getElementById('fDesc').value='';
  document.getElementById('fFeatured').checked=false;
  document.getElementById('formTitle').textContent='➕ إضافة منتج جديد';
  document.getElementById('cancelEdit').classList.add('hidden');
  clearImage();
}

function slugify(name){
  /* safe latin/digit filename; arabic names fall back to timestamp */
  const latin = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  return (latin || 'product') + '-' + Date.now() + '.jpg';
}

async function saveProduct(){
  const name=document.getElementById('fName').value.trim();
  if(!name){ showToast('⚠️ اكتب اسم المنتج الأول'); return; }
  const id=document.getElementById('editId').value;
  const btn=document.getElementById('saveBtn');
  const originalHTML = btn.innerHTML;

  /* figure out the image: freshly uploaded file > pasted URL > existing image (when editing) */
  let imageValue = document.getElementById('fImage').value.trim() || pendingImageExisting || '';

  if(pendingImageB64){
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> جاري رفع الصورة...';
    let token = getToken();
    if(!token){ token = await askForToken(); if(!token){ btn.disabled=false; btn.innerHTML=originalHTML; return; } }
    try{
      imageValue = await ghUploadImage(token, pendingImageB64, slugify(name));
    }catch(err){
      btn.disabled = false; btn.innerHTML = originalHTML;
      if(err.kind==='auth'){ showToast('❌ المفتاح غير صحيح'); setToken(''); }
      else showToast('⚠️ فشل رفع الصورة، جرّب تاني');
      return;
    }
    btn.disabled = false; btn.innerHTML = originalHTML;
  }

  const data={
    id: id || ('p_' + Date.now()),
    name,
    category: document.getElementById('fCat').value,
    price: document.getElementById('fPrice').value.trim(),
    image: imageValue,
    desc: document.getElementById('fDesc').value.trim(),
    featured: document.getElementById('fFeatured').checked
  };
  let updated;
  if(id){
    updated = products.map(p=> p.id===id ? data : p);
  } else {
    updated = [data, ...products];
  }
  await pushUpdate(updated, id ? 'تعديل منتج: '+name : 'إضافة منتج: '+name);
}

async function deleteProduct(id){
  const p = products.find(x=>x.id===id);
  if(!confirm('متأكد إنك عايز تحذف المنتج ده؟')) return;
  const updated = products.filter(x=>x.id!==id);
  await pushUpdate(updated, 'حذف منتج: ' + (p?p.name:id));
}

async function pushUpdate(updatedList, message){
  const btn=document.getElementById('saveBtn');
  const originalHTML = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> جاري الحفظ على الموقع...';
  let token = getToken();
  if(!token){ token = await askForToken(); if(!token){ btn.disabled=false; btn.innerHTML=originalHTML; return; } }
  try{
    const result = await ghPutFile(token, currentSha, updatedList, message);
    currentSha = result.content.sha;
    products = updatedList;
    renderList();
    resetForm();
    showToast('✅ اتحدّث الموقع مباشرة! التغيير هيظهر خلال ثواني.');
  }catch(err){
    if(err.kind==='auth'){
      showToast('❌ المفتاح غير صحيح — هيُطلب منك تدخل مفتاح جديد');
      setToken('');
      await ensureTokenAndLoad();
    } else {
      showToast('⚠️ حصل خطأ أثناء الحفظ، جرّب تاني');
    }
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalHTML;
  }
}

function editProduct(id){
  const p=products.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('editId').value=p.id;
  document.getElementById('fName').value=p.name;
  document.getElementById('fCat').value=p.category||'مستلزمات طبية';
  document.getElementById('fPrice').value=p.price||'';
  document.getElementById('fDesc').value=p.desc||'';
  document.getElementById('fFeatured').checked=!!p.featured;
  /* image: show existing image as preview; a new upload will replace it */
  clearImage();
  if(p.image){
    pendingImageExisting = p.image;
    document.getElementById('imgPreviewEl').src = p.image;
    document.getElementById('imgPreview').classList.remove('hidden');
    document.getElementById('imgPickBtn').textContent = '📷 تغيير الصورة';
  }
  document.getElementById('formTitle').textContent='✏️ تعديل منتج';
  document.getElementById('cancelEdit').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3200);
}

function boot(){ ensureTokenAndLoad(); }
if(!document.getElementById('gate').classList.contains('hidden')){
  /* waiting for login */
} else {
  boot();
}
</script>
